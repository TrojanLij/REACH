name: Docs CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli2
        run: npm install --global markdownlint-cli2

      - name: Lint Markdown
        run: markdownlint-cli2 "README.md" "docs/**/*.md"

  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml README.md docs/**/*.md
          fail: true

  mkdocs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: python -m pip install --upgrade pip && python -m pip install .[docs]

      - name: Build MkDocs (strict)
        run: mkdocs build --strict

