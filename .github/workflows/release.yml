name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (example: v0.1.3)"
        required: true
        type: string

jobs:
  verify-e2e:
    name: Verify E2E (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: false

      - name: Show Python version
        run: python --version

      - name: Install OS dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dnsutils curl

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install .
          pip install pytest

      - name: Run E2E tests
        shell: bash
        run: |
          set -euo pipefail
          pytest tests/reach/e2e

  release:
    needs: verify-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Invalid tag format: $tag"
            echo "Expected: v<semver> (example: v0.1.4)"
            exit 1
          fi

          version="${BASH_REMATCH[1]}"

          # For manual dispatch, ensure the tag exists in remote.
          git fetch --tags --force
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag '$tag' was not found. Create/push it before manual release."
            exit 1
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout resolved tag ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.meta.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate pyproject version matches tag
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          expected = os.environ["VERSION"]
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          actual = str(data.get("project", {}).get("version", ""))
          if actual != expected:
            raise SystemExit(
                f"pyproject.toml version mismatch: expected {expected}, found {actual!r}"
            )
          print(f"pyproject.toml OK: version={actual}")
          PY
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          notes_file="release_notes.md"

          if [[ -f "CHANGELOG.md" ]]; then
            awk -v v="v${version}" '
              $0 ~ ("^## " v "($| )") {in_section=1; print; next}
              in_section && $0 ~ "^## " {exit}
              in_section {print}
            ' CHANGELOG.md > "$notes_file"
          fi

          if [[ ! -s "$notes_file" ]]; then
            {
              echo "Release v${version}"
              echo
              echo "No changelog section found in CHANGELOG.md for v${version}."
            } > "$notes_file"
          fi

          echo "notes_path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.notes.outputs.notes_path }}

