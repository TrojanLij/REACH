site_name: REACH
site_description: Request Engine for Attacks, Callbacks, and Handling
repo_name: REACH
repo_url: https://github.com/TrojanLij/REACH

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    scheme: slate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CORE:
      - Architecture Overview: core/architecture.md
      - Core Runtime: core/core-runtime.md
      - Dynamic Routing (Public): core/dynamic-routing.md
      - Static Routing (Admin): core/admin-api.md
      - Protocols Architecture: 
        - Overview: core/protocols/protocols.md
        - HTTP: core/protocols/http.md
        - FTP: core/protocols/ftp.md
        - WSS: core/protocols/wss.md
      - Logging Pipeline: core/logging-pipeline.md
      - Persistence Layer: core/persistence-layer.md
      - Security Boundaries: core/security-boundaries.md
  - CLI:
      - Overview: cli/index.md
      - Server: cli/server.md
      - Routes: cli/routes.md
      - Logs: cli/logs.md
      - Forge: cli/forge.md
      - DNS: cli/dns.md
      - Dev: cli/dev.md
  - FORGE:
      - Forge Overview: forge/forge.md
      - Generators: forge/generators.md
      - Exploits: forge/exploits.md
      - Plugins and Subpages: forge/plugins.md
      - Trigger Rules (IFTTT): forge/ifttt_rules.md
  - OPERATIONS:
      - Servers and Protocols: operations/servers.md
      - DNS Service: operations/dns.md
      - Logs: operations/logs.md
      - Configuration: operations/config.md
      - Deployment: operations/deployment.md
      - Troubleshooting: operations/troubleshooting.md
  - Legacy Overview: overview.md
